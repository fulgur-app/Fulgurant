services:
  # ── PostgreSQL (optional, uncomment to use instead of SQLite) ────────
  # postgres:
  #   image: postgres:17-alpine
  #   container_name: fulgurant-postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: fulgurant
  #     POSTGRES_PASSWORD: fulgurant
  #     POSTGRES_DB: fulgurant
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U fulgurant"]
  #     interval: 10s
  #     timeout: 3s
  #     retries: 5

  fulgurant:
    build:
      context: .
      dockerfile: Dockerfile
    image: fulgurapp/fulgurant:latest
    container_name: fulgurant
    restart: unless-stopped
    # depends_on:        # Uncomment when using PostgreSQL
    #   postgres:
    #     condition: service_healthy

    # Port mapping
    ports:
      - '3000:3000'

    # Environment variables
    environment:
      # Database (SQLite - default)
      - DATABASE_URL=sqlite:/data/fulgurant.db
      # Database (PostgreSQL - uncomment and comment out SQLite above)
      # - DATABASE_URL=postgresql://fulgurant:fulgurant@postgres:5432/fulgurant

      # SMTP configuration (required for production)
      - SMTP_HOST=smtp.mail.ovh.net
      - SMTP_PORT=587
      - SMTP_LOGIN=mail@example.com
      - SMTP_PASSWORD=your_password_here

      # JWT Authentication (REQUIRED - generate with: openssl rand -base64 32)
      - JWT_SECRET=change_me_use_openssl_rand_base64_32
      - JWT_EXPIRY_SECONDS=900

      # Server configuration
      - IS_PROD=true
      - SHARE_VALIDITY_DAYS=3
      - CAN_REGISTER=false
      - MAX_DEVICES_PER_USER=10
      - SSE_HEARTBEAT_SECONDS=30

      # Network configuration
      - BIND_HOST=0.0.0.0
      - BIND_PORT=3000

      # Logging
      - RUST_LOG=info
      - LOG_FOLDER=/data/logs

      # Database backup
      - DAILY_DATABASE_BACKUP=false
      - BACKUP_FOLDER=/data/backups

      # User/Group IDs (match your host user for proper permissions)
      - PUID=1000
      - PGID=1000

    # Persistent data volume
    volumes:
      - ./data:/data

    # Health check
    healthcheck:
      test:
        ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://localhost:3000/api/ping']
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

    # Resource limits (optional but recommended)
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

    # Security options
    security_opt:
      - no-new-privileges:true

    # Read-only root filesystem (except /data and /tmp)
    # read_only: true
    # tmpfs:
    #   - /tmp

# ── Volumes (uncomment when using PostgreSQL) ────────
# volumes:
#   pgdata:
