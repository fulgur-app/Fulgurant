{% extends "layout.html" %} {% block page_title %}Admin{% endblock %} {% block head %}
<script src="/assets/js/admin.js"></script>
{% endblock %} {% block content %}
<!-- Add User Form -->
<div class="card bg-base-200 shadow-xl mb-6">
	<div class="card-body">
		<h3 class="card-title">Add New User</h3>
		<div id="user-error-message"></div>
		<form
			id="add-user-form-element"
			hx-post="/user/create"
			hx-target="#user-list"
			hx-swap="afterbegin"
		>
			<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
				<div>
					<label class="label">First Name</label>
					<input
						type="text"
						name="first_name"
						placeholder="John"
						required
						class="input input-bordered w-full"
					/>
				</div>
				<div>
					<label class="label">Last Name</label>
					<input
						type="text"
						name="last_name"
						placeholder="Doe"
						required
						class="input input-bordered w-full"
					/>
				</div>
				<div>
					<label class="label">Email</label>
					<input
						type="email"
						name="email"
						placeholder="john.doe@example.com"
						required
						class="input input-bordered w-full"
					/>
				</div>
				<div class="flex items-end">
					<button type="submit" class="btn btn-primary w-full">Add User</button>
				</div>
			</div>
		</form>
	</div>
</div>

<!-- Users List -->
<div class="card bg-base-200 shadow-xl mb-6">
	<div class="card-body">
		<div class="flex justify-between items-center">
			<h3 class="card-title">Users</h3>
			<span class="text-sm text-base-content/60"
				>{{ total_users }} user{{ total_users | pluralize("s") }}</span
			>
		</div>

		<form
			id="user-search-form"
			hx-get="/admin/users/search"
			hx-target="#user-list-container"
			hx-trigger="submit, input delay:500ms from:find input"
			hx-indicator="#search-indicator"
		>
			<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-4">
				<div>
					<label class="label">E-mail</label>
					<input
						type="text"
						name="email"
						placeholder="john.doe@example.com"
						class="input input-bordered w-full"
					/>
				</div>
				<div>
					<label class="label">First Name</label>
					<input
						type="text"
						name="first_name"
						placeholder="John"
						class="input input-bordered w-full"
					/>
				</div>
				<div>
					<label class="label">Last Name</label>
					<input
						type="text"
						name="last_name"
						placeholder="Doe"
						class="input input-bordered w-full"
					/>
				</div>
				<div>
					<label class="label">Role</label>
					<select name="role" class="select select-bordered w-full">
						<option value="All" selected>All</option>
						<option value="User">User</option>
						<option value="Admin">Admin</option>
					</select>
				</div>
				<div class="flex items-end">
					<button type="submit" class="btn btn-primary w-full">Search</button>
				</div>
			</div>
		</form>

		<div id="user-list-container">{% include "partials/admin/user_list.html" %}</div>
	</div>
</div>
{% endblock %}
