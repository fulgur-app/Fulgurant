{% extends "layout.html" %}

{% block page_title %}Forgot Password{% endblock %}

{% block content %}
    <div class="flex justify-center items-center min-h-[50vh] p-8 max-sm:min-h-0 max-sm:p-4 max-sm:flex-1">
        <div class="card bg-base-100 shadow-xl w-full max-w-md">
            <div class="card-body">
                <h2 class="card-title text-2xl">Reset Password</h2>
                <p>Set a new password for your account</p>
                <div id="container">
                    {% if error_message != "" %}
                        <div class="alert alert-error mb-4" role="alert">{{ error_message }}</div>
                    {% endif %}
                    <form id="forgot-password-form"
                        hx-post="/auth/forgot-password"
                        hx-target="#container"
                        hx-swap="innerHTML">
                        <label class="label" for="email">Email</label>
                        <input type="email" id="email" name="email" required autocomplete="email" placeholder="john.doe@example.com" value="{{ email }}" class="input input-bordered w-full" />
                        <button type="submit" class="btn btn-primary w-full mt-6">Send Verification Code</button>
                        <div class="text-center mt-4">
                            Remember your password?&nbsp;<a href="/login" class="link">Back to login</a>.
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
