<div class="alert alert-success mb-4" role="alert">
    Name successfully updated to {{ first_name }} {{ last_name }}!
</div>

<form hx-post="/settings/update-name"
      hx-target="#name-update-container"
      hx-swap="innerHTML">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
            <label class="label">First Name</label>
            <input type="text" name="first_name" value="{{ first_name }}" required class="input input-bordered w-full">
        </div>
        <div>
            <label class="label">Last Name</label>
            <input type="text" name="last_name" value="{{ last_name }}" required class="input input-bordered w-full">
        </div>
    </div>
    <div class="flex justify-end w-full">
        <button type="submit" class="btn btn-primary mt-4">Save Changes</button>
    </div>
</form>
