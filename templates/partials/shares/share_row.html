<tr class="share-row" id="share-{{ share.id }}">
	<td>{{ share.file_name }}</td>
	<td>{{ share.from }}</td>
	<td>{{ share.to }}</td>
	<td>{{ share.created_at }}</td>
	<td>{{ share.expires_at }}</td>
	<td class="whitespace-nowrap">
		<div class="flex items-center gap-1">
			<button
				class="btn btn-ghost btn-sm btn-square"
				data-tip="Delete share"
				hx-delete="/share/{{ share.id }}"
				hx-target="#share-{{ share.id }}"
				hx-swap="outerHTML swap:0.5s"
				hx-confirm="Are you sure you want to delete this share?"
			>
				<svg
					xmlns="http://www.w3.org/2000/svg"
					width="16"
					height="16"
					viewBox="0 0 24 24"
					fill="none"
					stroke="currentColor"
					stroke-width="2"
					stroke-linecap="round"
					stroke-linejoin="round"
				>
					<path d="M18 6 6 18" />
					<path d="m6 6 12 12" />
				</svg>
			</button>
		</div>
	</td>
</tr>
