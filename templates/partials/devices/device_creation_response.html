<tr id="device-empty-state" hx-swap-oob="delete"></tr>
{% include "partials/devices/device_row.html" %}
<tr>
    <td colspan="6" class="p-0">
        <div class="alert alert-success" x-data="clipboard">
            <div>
                <div class="flex flex-row items-center gap-2 mb-2">
                    <span>Your API key is:</span>
                    <code class="bg-neutral text-neutral-content px-2 py-1 rounded api-key-value">{{ api_key }}</code>
                    <button class="btn btn-ghost btn-sm btn-square" x-on:click="copyFromSibling">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect width="14" height="14" x="8" y="8" rx="2" ry="2" />
                            <path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2" />
                        </svg>
                    </button>
                    <span class="text-sm font-medium" x-show="copied">Copied!</span>
                </div>
                <div>
                    This API key is used to authenticate your device.
                    <strong>It will not be displayed again!</strong> Keep it secret and safe.
                </div>
            </div>
        </div>
    </td>
</tr>
