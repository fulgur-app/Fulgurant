{% if success_message != "" %}
    <div class="alert alert-success mb-4" role="status">{{ success_message }}</div>
{% endif %}

{% if error_message != "" %}
    <div class="alert alert-error mb-4" role="alert">{{ error_message }}</div>
{% endif %}

<form hx-post="/auth/forgot-password/verify"
      hx-target="#container"
      hx-swap="innerHTML">

    <input type="hidden" name="email" value="{{ email }}">

    <label class="label">Verification Code</label>
    <p class="text-sm text-base-content/60 mt-1 mb-3">Enter the 6-digit verification code sent to your email address ({{ email }})</p>
    <input type="text"
           name="code"
           placeholder="000000"
           minlength="6"
           maxlength="6"
           pattern="[0-9]{6}"
           required
           autofocus
           class="input input-bordered w-full">

    <button type="submit" class="btn btn-primary w-full mt-6">Verify Code</button>
</form>

<div class="text-center mt-4">
    <button class="btn btn-outline w-full"
            hx-get="/auth/forgot-password/resend?email={{ email }}"
            hx-target="#container"
            hx-swap="innerHTML">
        Didn't receive the code? Resend
    </button>
</div>

<div class="text-center mt-4">
    <a href="/auth/forgot-password" class="link">Start over</a>
</div>
