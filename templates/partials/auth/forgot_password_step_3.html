{% if error_message != "" %}
    <div class="alert alert-error mb-4" role="alert">{{ error_message }}</div>
{% endif %}

<form hx-post="/auth/forgot-password/reset"
      hx-target="#container"
      hx-swap="innerHTML">

    <input type="hidden" name="email" value="{{ email }}">

    <label class="label" for="password">New Password</label>
    <p class="text-sm text-base-content/60 mt-1 mb-3">Minimum 8 characters, at least one uppercase letter, one lowercase letter, one number and one special character</p>
    <input type="password"
           id="password"
           name="password"
           required
           autocomplete="new-password"
           minlength="8"
           autofocus
           class="input input-bordered w-full" />

    <button type="submit" class="btn btn-primary w-full mt-6">Reset Password</button>
</form>

<div class="text-center mt-4">
    <a href="/auth/forgot-password" class="link">Start over</a>
</div>
